<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John — Mechanical Engineer</title>
<meta name="description" content="Mechanical engineer working on optical hardware and MEMS systems.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #ffffff;
    --ink-soft: rgba(255, 255, 255, 0.75);
    --overlay: rgba(0, 0, 0, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* Hero background image */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    background-image: url('hero.jpg');
    background-size: cover;
    background-position: center;
    background-color: #2a2a2a; /* fallback while image loads / if missing */
  }

  /* Dark overlay for text legibility */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--overlay);
    pointer-events: none;
  }

  /* Navigation */
  nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 32px 48px;
    display: flex;
    justify-content: flex-end;
    gap: 40px;
  }

  nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding-bottom: 4px;
    border-bottom: 1px solid transparent;
    transition: border-color 0.25s ease;
  }

  nav a:hover {
    border-bottom-color: var(--ink);
  }

  /* Centered hero text */
  .hero-text {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 32px;
  }

  .hero-text h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(48px, 9vw, 112px);
    line-height: 1;
    letter-spacing: -0.02em;
    max-width: 14ch;
  }

  .hero-text .subtitle {
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  @media (max-width: 600px) {
    nav { padding: 24px; gap: 24px; }
    nav a { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="hero">
  <nav>
    <a href="projects.html">Projects</a>
  </nav>

  <div class="hero-text">
    <h1>Your headline here.</h1>
    <div class="subtitle">Replace this with your own text</div>
  </div>
</div>

</body>
</html>
